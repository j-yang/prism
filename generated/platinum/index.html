<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Review Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 id="study-title">Study <span id="study-code">Loading...</span></h1>
            <div class="header-meta">
                <span id="generated-date"></span>
            </div>
        </header>
        
        <div class="main-layout">
            <nav class="sidebar">
                <div class="nav-section">
                    <h3>Tables</h3>
                    <ul id="nav-tables"></ul>
                </div>
                <div class="nav-section">
                    <h3>Figures</h3>
                    <ul id="nav-figures"></ul>
                </div>
                <div class="nav-section">
                    <h3>Listings</h3>
                    <ul id="nav-listings"></ul>
                </div>
                <div class="nav-section">
                    <h3>Data</h3>
                    <ul>
                        <li><a href="#" onclick="showDataBrowser()">Browse Data</a></li>
                    </ul>
                </div>
            </nav>
            
            <main class="content" id="main-content">
                <div class="loading">Loading...</div>
            </main>
        </div>
        
        <footer class="footer">
            Generated by PRISM-DB | <span id="footer-date"></span>
        </footer>
    </div>
    
    <!-- Traceability Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Traceability</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
            </div>
        </div>
    </div>
    
    <!-- DuckDB WASM -->
    <script type="module" src="app.js"></script>
</body>
</html>
